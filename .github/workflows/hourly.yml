name: Traffic fetch hourly

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: awp-traffic-repo-writes
  cancel-in-progress: false

jobs:
  fetch-traffic:
    runs-on: ubuntu-latest
    env:
      TOMTOM_API_KEY: ${{ secrets.TOMTOM_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch traffic measurements
        shell: bash
        run: |
          set +e
          python scripts/fetch_traffic.py
          code=$?
          echo "FETCH_EXIT=$code" >> "$GITHUB_ENV"
          exit 0

      - name: Generate dashboard
        if: always()
        run: python scripts/make_dashboard.py

      - name: Commit collected data
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/awp_traffic.sqlite data/raw reports/dashboard reports/maps
          if git diff --cached --quiet; then
            echo "No traffic data changes to commit."
          else
            git commit -m "Collect traffic data"
            git pull --rebase
            git push
          fi

      - name: Fail job if fetch failed
        if: env.FETCH_EXIT != '0'
        run: exit ${{ env.FETCH_EXIT }}
