services:
  scheduler:
    build: .
    container_name: awp-traffic-scheduler
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TZ: Europe/Warsaw
    volumes:
      - ./config:/app/config:ro
      - ./data:/app/data
      - ./reports:/app/reports
      - ./backups:/app/backups
    command: ["python", "scripts/server_scheduler.py"]

  dashboard:
    build: .
    container_name: awp-traffic-dashboard
    restart: unless-stopped
    environment:
      TZ: Europe/Warsaw
    volumes:
      - ./config:/app/config:ro
      - ./data:/app/data
      - ./reports:/app/reports
      - ./backups:/app/backups
    ports:
      - "8000:8000"
    command:
      - python
      - scripts/serve_dashboard.py
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --no-open
